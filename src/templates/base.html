<!DOCTYPE html>
<html lang="{{lang}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{pageTitle}}</title>
  <meta name="description" content="{{pageDescription}}">
  <meta name="robots" content="{{robotsMeta}}">
  <link rel="canonical" href="https://sentyacht.com{{canonicalPath}}">
  <link rel="alternate" hreflang="es" href="https://sentyacht.com{{hreflangEs}}">
  <link rel="alternate" hreflang="en" href="https://sentyacht.com{{hreflangEn}}">
  <link rel="alternate" hreflang="x-default" href="https://sentyacht.com{{hreflangEs}}">

  <meta property="og:title" content="{{pageTitle}}">
  <meta property="og:description" content="{{pageDescription}}">
  <meta property="og:image" content="{{ogImage}}">
  <meta property="og:url" content="https://sentyacht.com{{canonicalPath}}">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="{{ogLocale}}">
  <meta property="og:site_name" content="SentYacht">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%230077CC'>S</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/dist/styles/tailwind.css">
  <link rel="stylesheet" href="/src/styles/main.css">
  {{headExtra}}
</head>
<body class="bg-base text-text antialiased {{bodyClass}}">

  <a href="#main-content" class="skip-link">Skip to content</a>

  {{> header}}

  <main id="main-content">
    {{content}}
  </main>

  {{> footer}}
  {{> cookie-banner}}

  {{structuredData}}

  <script>
    /* ─── Scroll Reveal ─── */
    (function() {
      const els = document.querySelectorAll('.reveal');
      if (!els.length) return;
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const delay = parseInt(entry.target.dataset.delay || '0');
            setTimeout(() => entry.target.classList.add('visible'), delay);
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
      els.forEach(el => observer.observe(el));
    })();

    /* ─── Navbar Scroll ─── */
    (function() {
      const nav = document.getElementById('navbar');
      if (!nav) return;
      let ticking = false;
      window.addEventListener('scroll', () => {
        if (!ticking) {
          requestAnimationFrame(() => {
            if (window.scrollY > 60) {
              nav.classList.remove('nav-transparent');
              nav.classList.add('nav-solid');
            } else {
              nav.classList.remove('nav-solid');
              nav.classList.add('nav-transparent');
            }
            ticking = false;
          });
          ticking = true;
        }
      }, { passive: true });
    })();

    /* ─── Mobile Menu ─── */
    (function() {
      const btn = document.getElementById('mobile-menu-btn');
      const menu = document.getElementById('mobile-menu');
      if (!btn || !menu) return;
      btn.addEventListener('click', () => {
        const isOpen = menu.classList.contains('open');
        menu.classList.toggle('open');
        btn.classList.toggle('hamburger-active');
        document.body.style.overflow = isOpen ? '' : 'hidden';
        btn.setAttribute('aria-expanded', !isOpen);
      });
      menu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          menu.classList.remove('open');
          btn.classList.remove('hamburger-active');
          document.body.style.overflow = '';
          btn.setAttribute('aria-expanded', 'false');
        });
      });
    })();

    /* ─── Cookie Consent ─── */
    (function() {
      const banner = document.getElementById('cookie-banner');
      if (!banner || localStorage.getItem('sy-cookies')) return;
      setTimeout(() => banner.classList.add('visible'), 1500);
      document.getElementById('cookie-accept')?.addEventListener('click', () => {
        localStorage.setItem('sy-cookies', 'accepted');
        banner.classList.remove('visible');
      });
      document.getElementById('cookie-reject')?.addEventListener('click', () => {
        localStorage.setItem('sy-cookies', 'rejected');
        banner.classList.remove('visible');
      });
    })();

    /* ─── FAQ Accordion ─── */
    window.toggleFaq = function(btn) {
      const item = btn.closest('.faq-item');
      const isOpen = item.classList.contains('open');
      // Close all
      document.querySelectorAll('.faq-item.open').forEach(function(el) { el.classList.remove('open'); });
      // Toggle current
      if (!isOpen) item.classList.add('open');
      btn.setAttribute('aria-expanded', !isOpen);
    };
  </script>
</body>
</html>
