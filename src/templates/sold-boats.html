<!-- Sold Boats Page -->
<div class="pt-20 lg:pt-24"></div>

<!-- ═══ INTRO ═══ -->
<section class="pt-12 pb-8 bg-base">
  <div class="max-w-3xl mx-auto px-6 lg:px-8">
    <h1 class="font-serif text-4xl lg:text-5xl text-text tracking-tight">{{soldTitle}}</h1>
    <p class="mt-3 text-text-secondary text-lg">{{soldSubtitle}}</p>
    <p class="mt-6 text-text-secondary leading-relaxed">{{soldIntroText}}</p>
  </div>
</section>

<!-- ═══ SOLD BOATS GRID OR EMPTY STATE ═══ -->
{{soldContentHTML}}

<!-- ═══ SELLER CTA ═══ -->
<section class="py-20 bg-dark relative overflow-hidden">
  <div class="absolute inset-0 grain-overlay opacity-50"></div>
  <div class="relative z-10 max-w-2xl mx-auto px-6 lg:px-8 text-center">
    <h2 class="font-serif text-3xl lg:text-4xl text-white tracking-tight text-balance">{{soldSellerCTATitle}}</h2>
    <p class="mt-4 text-white/70 leading-relaxed">{{soldSellerCTAText}}</p>
    <a href="{{soldSellerCTAHref}}" class="mt-8 inline-flex btn-primary">
      {{soldSellerCTAButton}}
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
    </a>
  </div>
</section>

<!-- ═══ BROWSE CTA ═══ -->
<section class="py-12 bg-surface-alt border-t border-border-light">
  <div class="max-w-2xl mx-auto px-6 lg:px-8 text-center">
    <p class="text-text-secondary">{{soldBrowseCTAText}}</p>
    <a href="{{soldBrowseCTAHref}}" class="mt-4 inline-flex btn-secondary">{{soldBrowseCTAButton}}</a>
  </div>
</section>
