server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Charset
    charset utf-8;

    # Clean URLs: /es/ -> /es/index.html
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Handle spaces in asset paths (imagenes web/)
    location /assets/ {
        try_files $uri =404;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|css|js|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Cache HTML pages (short cache for updates)
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Sitemap and robots
    location = /sitemap.xml {
        expires 1d;
    }
    location = /robots.txt {
        expires 1d;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Custom 404
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # Disable access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
}
